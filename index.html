<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelPlan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#f4f7fb;
color:#333;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:white;
box-shadow:0 3px 12px rgba(0,0,0,0.06);
position:sticky;
top:0;
z-index:10;
}

.logo{
font-weight:700;
font-size:22px;
color:#2a7de1;
}

nav ul{
display:flex;
gap:30px;
list-style:none;
}

nav a{
text-decoration:none;
color:#444;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#2a7de1;
}

/* HERO */

.hero{
height:75vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
color:white;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.35)),
url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");

background-size:cover;
background-position:center;
}

.hero h1{
font-size:52px;
margin-bottom:15px;
}

.hero p{
margin-bottom:25px;
font-size:18px;
opacity:0.9;
}

.search-box{
background:white;
padding:16px;
border-radius:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.search-box input{
padding:10px;
border:none;
background:#f1f3f7;
border-radius:6px;
}

.search-box button{
background:#2a7de1;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

/* SECTIONS */

.section{
padding:70px 8%;
}

.section h2{
text-align:center;
margin-bottom:45px;
font-size:30px;
}

/* DESTINATION CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card h3{
padding:16px;
}

/* ITINERARY */

.itinerary{
max-width:650px;
margin:auto;
text-align:center;
}

.itinerary input{
width:65%;
padding:11px;
border:1px solid #ddd;
border-radius:7px;
}

.itinerary button{
padding:11px 16px;
background:#2a7de1;
color:white;
border:none;
border-radius:7px;
cursor:pointer;
margin-left:6px;
}

.list{
margin-top:25px;
text-align:left;
}

.list li{
background:white;
margin-bottom:12px;
padding:13px;
border-radius:7px;
display:flex;
justify-content:space-between;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* FOOTER */

footer{
text-align:center;
padding:35px;
background:#111;
color:#aaa;
margin-top:60px;
}

footer span{
color:white;
font-weight:500;
}

</style>
</head>

<body>

<nav>
<div class="logo">TravelPlan</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#destinations">Destinations</a></li>
<li><a href="#planner">Planner</a></li>
</ul>
</nav>

<section class="hero">

<h1>Discover Your Next Adventure</h1>
<p>Plan smarter trips with a simple itinerary builder</p>

<div class="search-box">
<input type="text" placeholder="Destination">
<input type="date">
<input type="date">
<button onclick="searchTrip()">Search</button>
</div>

</section>

<section class="section" id="destinations">

<h2>Popular Destinations</h2>


</section>

<section class="section" id="planner">

<h2>Create Your Itinerary</h2>


</section>

<footer>
<p>© 2026 <span>TravelPlan</span> — Plan better journeys</p>
</footer>

<script>

function searchTrip(){
alert("Travel search coming soon");
}

function addActivity(){

let input=document.getElementById("activityInput");
let text=input.value;

if(text==="") return;

let li=document.createElement("li");

li.innerHTML = text + " <button onclick='this.parentElement.remove()'>❌</button>";

document.getElementById("activityList").appendChild(li);

input.value="";
}

</script>

</body>
</html>
